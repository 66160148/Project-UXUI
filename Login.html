<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanPao-Login</title>
  <link rel="stylesheet" href="style.css">
</head>
    <div class="login-container">
        <button class="back-button" onclick="window.location.href='Home.html'">←</button>
      <h1 class="header-title">PlanPao</h1>
      <div class="login-title">เข้าสู่ระบบ</div>
      <form class="login-form">
        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" placeholder="กรอกอีเมลของคุณ">
        </div>
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" placeholder="กรอกรหัสผ่านของคุณ">
        </div>
        <div class="signup-link">
            ไม่มีบัญชีใช่ไหม? <a href="#">สมัครสมาชิก</a>
          </div>
        <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
      </form>
    </div>
</html>
